name: Tauri Multi-Platform Build

on:
  workflow_dispatch:
  push:
    branches: [ "master", "main" ]
    paths:
      - "tauri/**"
      - "batch_fbx2glb_final.sh"
      - "batch_fbx2glb.sh"
      - "batch_gltfpack.sh"
      - "batch_gltf_pipeline_draco.sh"
      - "batch_fbx2glb_final.bat"
      - "batch_fbx2glb.bat"
      - "batch_gltfpack.bat"
      - "batch_gltf_pipeline_draco.bat"
      - "Makefile"
      - "justfile"
      - "fbx_to_glb.py"
      - ".github/workflows/tauri-multi-platform.yml"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-universal
            os: macos-14
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            npm_script: tauri:build:mac
          - name: linux-x64
            os: ubuntu-22.04
            rust_targets: x86_64-unknown-linux-gnu
            npm_script: tauri:build:linux
          - name: windows-x64
            os: windows-2022
            rust_targets: x86_64-pc-windows-msvc
            npm_script: tauri:build:win

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: |
          corepack enable

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            patchelf \
            libjavascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev

      - name: pnpm install
        working-directory: tauri
        run: pnpm install --frozen-lockfile

      # Windows 需要 icon.ico 生成资源文件，从 icon.png 自动生成
      - name: Generate Windows icon (icon.ico)
        if: runner.os == 'Windows'
        working-directory: tauri
        run: npx tauri icon src-tauri/icons/icon.png

      - name: Build (Tauri)
        working-directory: tauri
        run: npm run ${{ matrix.npm_script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.name }}
          # 当使用 `--target` 构建时，bundle 通常在 `target/<triple>/release/bundle` 下。
          # 用 glob 兜底，避免路径写死导致找不到 artifacts。
          path: tauri/src-tauri/target/**/release/bundle

