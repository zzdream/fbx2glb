<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FBX -> GLB 转换器（Electron）</title>
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <main class="container">
      <h1>FBX -> GLB 转换器</h1>
      <p class="desc">选择目录后点击开始即可</p>

      <section class="card">
        <label>处理模式</label>
        <div class="row mode-row">
          <label><input type="radio" name="convertMode" value="fbx_to_glb_compress" checked /> FBX 转 GLB 并压缩 推荐</label>
          <label><input type="radio" name="convertMode" value="glb_compress_only" /> 仅压缩 GLB（gltfpack）推荐</label>
          <label><input type="radio" name="convertMode" value="glb_draco_only" /> 仅压缩 GLB（draco）</label>
        </div>
      </section>

      <section class="card">
        <label for="inputDir">输入目录（FBX）</label>
        <div class="row">
          <input id="inputDir" type="text" placeholder="请选择输入目录" readonly />
          <button id="pickInputBtn">选择</button>
        </div>
      </section>

      <section class="card">
        <label for="outputDir">输出目录（GLB）</label>
        <div class="row">
          <input id="outputDir" type="text" placeholder="请选择输出目录" readonly />
          <button id="pickOutputBtn">选择</button>
        </div>
      </section>

      <section class="actions">
        <button id="startBtn" class="primary">开始转换</button>
      </section>

      <section class="card">
        <label for="log">执行日志</label>
        <textarea id="log" readonly></textarea>
      </section>

      <section class="card">
        <label for="glbFileInput">GLB 模型预览</label>
        <div class="row">
          <input id="glbFilePath" type="text" placeholder="请选择本地 .glb 文件" readonly />
          <button id="pickGlbBtn">选择 GLB</button>
          <button id="pickGlbFolderBtn">选择文件夹</button>
        </div>
        <input id="glbFileInput" type="file" accept=".glb,model/gltf-binary" hidden />
        <input id="glbFolderInput" type="file" accept=".glb,model/gltf-binary" webkitdirectory directory multiple hidden />
        <div id="previewStatus" class="preview-status">未加载模型</div>
        <div class="preview-shell">
          <div id="previewCanvas" class="preview-canvas"></div>
          <button id="toggleFullscreenBtn" class="preview-fs-btn">全屏预览</button>
        </div>
      </section>
    </main>
  </body>
</html>
